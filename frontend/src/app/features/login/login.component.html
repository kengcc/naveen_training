<section class="auth-layout">
  <div class="auth-copy">
    <p class="section-kicker">Access control</p>
    <h2>Sign in to plan leave without spreadsheets.</h2>
    <p>
      TM R&D employees can request holidays, managers can approve work, and admins can review
      reporting from one place.
    </p>
  </div>

  <form class="auth-card" (ngSubmit)="signIn()">
    <label>
      <span>Email</span>
      <input name="email" [(ngModel)]="credentials.email" type="email" autocomplete="email" />
    </label>

    <label>
      <span>Password</span>
      <input
        name="password"
        [(ngModel)]="credentials.password"
        type="password"
        autocomplete="current-password"
      />
    </label>

    <p class="auth-error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button type="submit">Sign in</button>

    <div class="auth-hint">
      <p>Demo accounts</p>
      <small>employee, manager, and admin presets are available in the scaffold.</small>
    </div>
  </form>
</section>
