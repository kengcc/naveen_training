<div class="shell">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <div>
        <p class="eyebrow">TM R&D</p>
        <h1>Holiday Planner</h1>
      </div>
    </div>

    <nav class="nav">
      <a *ngFor="let item of navigation" [routerLink]="item.path" routerLinkActive="active">
        {{ item.label }}
      </a>
    </nav>

    <div class="session">
      <div>
        <p class="session-label">Signed in as</p>
        <strong>{{ (authService.currentUser$ | async)?.name || 'Demo User' }}</strong>
      </div>
      <a routerLink="/login" class="ghost-link">Switch account</a>
    </div>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
